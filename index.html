<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMO Central</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f6f5f0;
  --surface: #ffffff;
  --surface2: #faf9f6;
  --surface3: #f0efea;
  --border: #e4e2da;
  --border2: #d1cfc6;
  --text: #1a1917;
  --text2: #5c5a52;
  --text3: #9c998f;
  --accent: #2d5be3;
  --accent2: #1e40af;
  --amber: #b45309;
  --amber-bg: #fef3c7;
  --green: #15803d;
  --green-bg: #dcfce7;
  --red: #b91c1c;
  --red-bg: #fee2e2;
  --blue: #1d4ed8;
  --blue-bg: #dbeafe;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --r: 6px;
  --r2: 10px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

/* ─── TOPBAR ─── */
.topbar {
  background: var(--text);
  color: #fff;
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  gap: 12px;
  height: 52px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-logo { font-family: var(--mono); font-size: 13px; font-weight: 500; letter-spacing: 0.12em; }
.tsep { width: 1px; height: 20px; background: rgba(255,255,255,0.12); }
.topbar-mode { font-size: 12px; color: rgba(255,255,255,0.45); }
.tright { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.sync-pill {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.06); border-radius: 20px; padding: 3px 10px;
}
.sdot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
.sdot.syncing { background: #f59e0b; animation: blink 0.8s infinite; }
.sdot.error { background: #ef4444; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.btn-top {
  font-family: var(--mono); font-size: 11px; padding: 0 10px; height: 26px;
  border-radius: var(--r); cursor: pointer;
  border: 1px solid rgba(255,255,255,0.15); background: transparent; color: rgba(255,255,255,0.65);
  transition: all 0.12s;
}
.btn-top:hover { background: rgba(255,255,255,0.1); color: #fff; }

/* ─── TABS ─── */
.tabs {
  display: flex; border-bottom: 1px solid var(--border);
  background: var(--surface); padding: 0 1.5rem; gap: 0;
}
.tab {
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  letter-spacing: 0.05em; padding: 12px 18px; cursor: pointer;
  border-bottom: 2px solid transparent; color: var(--text3);
  text-transform: uppercase; transition: all 0.12s; user-select: none;
}
.tab:hover { color: var(--text2); }
.tab.active { border-bottom-color: var(--accent); color: var(--text); }

/* ─── MAIN ─── */
.main { padding: 1.5rem; max-width: 1440px; margin: 0 auto; }

/* ─── METRICS ─── */
.metrics { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 1.5rem; }
@media (max-width: 768px) { .metrics { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 480px) { .metrics { grid-template-columns: repeat(2, 1fr); } }
.metric {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r2); padding: 14px 16px; box-shadow: var(--shadow-sm);
}
.metric-label {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; margin-bottom: 6px;
}
.metric-val { font-family: var(--mono); font-size: 26px; font-weight: 500; }
.mv-total { color: var(--text); }
.mv-pend { color: var(--amber); }
.mv-prog { color: var(--blue); }
.mv-done { color: var(--green); }
.mv-block { color: var(--red); }

/* ─── TOOLBAR ─── */
.toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
.toolbar input, .toolbar select {
  font-family: var(--sans); font-size: 13px; padding: 7px 10px;
  border-radius: var(--r); border: 1px solid var(--border2);
  background: var(--surface); color: var(--text); outline: none; height: 34px;
}
.toolbar input:focus, .toolbar select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(45,91,227,0.08); }
.toolbar input { min-width: 200px; }
@media (max-width: 640px) { .toolbar input { min-width: 140px; } }
.ml-auto { margin-left: auto; }

/* ─── BUTTONS ─── */
.btn {
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  letter-spacing: 0.03em; padding: 0 14px; height: 34px;
  border-radius: var(--r); cursor: pointer;
  border: 1px solid var(--border2); background: var(--surface); color: var(--text);
  transition: all 0.12s; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { background: var(--surface2); box-shadow: var(--shadow-sm); }
.btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-accent:hover { background: var(--accent2); box-shadow: var(--shadow); }
.btn-ghost { border-color: transparent; background: transparent; }
.btn-ghost:hover { background: var(--surface3); border-color: var(--border); }
.btn-sm { font-size: 11px; padding: 0 10px; height: 28px; }
.btn-danger { color: var(--red); border-color: #fca5a5; }
.btn-danger:hover { background: var(--red-bg); }

/* ─── TABLE ─── */
.section-head { display: flex; align-items: center; gap: 10px; margin: 1.5rem 0 6px; }
.section-head:first-child { margin-top: 0; }
.section-title {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  letter-spacing: 0.08em; color: var(--text2); text-transform: uppercase;
}
.section-count {
  font-family: var(--mono); font-size: 11px; color: var(--text3);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 1px 8px;
}
table {
  width: 100%; border-collapse: collapse; background: var(--surface);
  border-radius: var(--r2); border: 1px solid var(--border);
  overflow: hidden; margin-bottom: 1rem; box-shadow: var(--shadow-sm);
}
th {
  text-align: left; font-family: var(--mono); font-size: 10px; font-weight: 500;
  letter-spacing: 0.08em; color: var(--text3); padding: 9px 12px;
  border-bottom: 1px solid var(--border); background: var(--surface2); text-transform: uppercase;
}
td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafaf8; }
.task-desc { font-size: 13px; font-weight: 500; }
.task-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.role-pill {
  display: inline-block; font-family: var(--mono); font-size: 10px;
  padding: 2px 8px; border-radius: 20px;
  background: var(--surface2); color: var(--text2); border: 1px solid var(--border);
}
.prio-high { color: var(--red); font-weight: 500; font-family: var(--mono); font-size: 12px; }
.prio-med { color: var(--amber); font-family: var(--mono); font-size: 12px; }
.prio-low { color: var(--green); font-family: var(--mono); font-size: 12px; }
.date-ok { color: var(--text3); font-family: var(--mono); font-size: 12px; }
.date-over { color: var(--red); font-weight: 500; font-family: var(--mono); font-size: 12px; }
.row-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.1s; }
tr:hover .row-actions { opacity: 1; }
.empty-state {
  text-align: center; padding: 3rem; color: var(--text3); font-size: 13px;
  background: var(--surface); border-radius: var(--r2); border: 1px solid var(--border);
}

/* ─── KANBAN ─── */
.kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; align-items: start; }
@media (max-width: 900px) { .kanban { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 520px) { .kanban { grid-template-columns: 1fr; } }
.k-col { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r2); overflow: hidden; }
.k-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.k-label { font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text2); }
.k-count { font-family: var(--mono); font-size: 11px; color: var(--text3); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1px 7px; }
.k-bar { height: 3px; }
.kb-pending { background: #f59e0b; }
.kb-progress { background: #3b82f6; }
.kb-done { background: #22c55e; }
.kb-blocked { background: #ef4444; }
.k-cards { padding: 10px; display: flex; flex-direction: column; gap: 8px; min-height: 60px; }
.k-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
  padding: 12px; transition: box-shadow 0.12s; cursor: pointer;
}
.k-card:hover { box-shadow: var(--shadow); }
.k-card-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 8px; line-height: 1.4; }
.k-card-meta { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
.k-card-owner { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.k-card-date { font-family: var(--mono); font-size: 10px; }
.k-card-prio-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-high { background: #ef4444; }
.dot-med { background: #f59e0b; }
.dot-low { background: #22c55e; }

/* ─── TIMELINE ─── */
.timeline-group { margin-bottom: 1.5rem; }
.tl-date-header {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  letter-spacing: 0.08em; color: var(--text2); text-transform: uppercase;
  padding: 8px 0; display: flex; align-items: center; gap: 10px;
}
.tl-date-header::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.tl-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--r);
  margin-bottom: 6px; transition: all 0.12s;
}
.tl-item:hover { box-shadow: var(--shadow-sm); }
.tl-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.tl-content { flex: 1; }
.tl-title { font-size: 13px; font-weight: 500; }
.tl-meta { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 3px; }

/* ─── MODAL ─── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 200;
  align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--r2);
  border: 1px solid var(--border2); width: 520px;
  max-width: 96vw; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg); animation: modalIn 0.15s ease-out;
}
@keyframes modalIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.modal-header {
  padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-family: var(--mono); font-size: 14px; font-weight: 500; letter-spacing: 0.04em; }
.modal-close { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; line-height: 1; padding: 4px; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px; }
.modal-footer {
  padding: 14px 20px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
}
.field { margin-bottom: 14px; }
.field label {
  display: block; font-family: var(--mono); font-size: 11px; font-weight: 500;
  letter-spacing: 0.06em; color: var(--text2); text-transform: uppercase; margin-bottom: 5px;
}
.field input, .field select, .field textarea {
  width: 100%; font-family: var(--sans); font-size: 13px; padding: 8px 10px;
  border-radius: var(--r); border: 1px solid var(--border2);
  background: var(--surface); color: var(--text); outline: none;
  transition: border-color 0.12s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--accent); box-shadow: 0 0 0 2px rgba(45,91,227,0.08);
}
.field textarea { resize: vertical; min-height: 60px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
@media (max-width: 520px) { .grid2, .grid3 { grid-template-columns: 1fr; } }

/* ─── OUTLOOK MODAL ─── */
.ocard {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r2); padding: 16px; margin-bottom: 14px;
}
.ocard-title {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  letter-spacing: 0.06em; color: var(--text2); text-transform: uppercase; margin-bottom: 10px;
}
.orow { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.orow label { font-family: var(--mono); font-size: 10px; color: var(--text3); width: 80px; flex-shrink: 0; text-transform: uppercase; }
.orow input, .orow select, .orow textarea {
  flex: 1; font-family: var(--sans); font-size: 13px; padding: 7px 10px;
  border-radius: var(--r); border: 1px solid var(--border2);
  background: var(--surface); color: var(--text); outline: none;
}
.orow textarea { resize: vertical; min-height: 60px; }
.att-row { display: flex; gap: 6px; margin-bottom: 6px; }
.att-row input {
  flex: 1; font-family: var(--sans); font-size: 13px; padding: 6px 10px;
  border-radius: var(--r); border: 1px solid var(--border2);
  background: var(--surface); color: var(--text);
}
.btn-att {
  font-family: var(--mono); font-size: 11px; padding: 0 12px; height: 32px;
  border-radius: var(--r); border: 1px solid var(--border2);
  background: var(--surface); color: var(--text2); cursor: pointer;
}
.att-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 11px; padding: 3px 10px;
  border-radius: 20px; background: var(--surface);
  border: 1px solid var(--border); color: var(--text2); margin: 3px 3px 3px 0;
}
.att-tag button { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 13px; line-height: 1; padding: 0; }
.otip {
  font-size: 12px; color: var(--text3); background: var(--surface2);
  border: 1px solid var(--border); border-radius: var(--r); padding: 10px 12px; line-height: 1.6;
}

/* ─── TOAST ─── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--text); color: #fff;
  font-family: var(--mono); font-size: 12px;
  padding: 10px 16px; border-radius: var(--r);
  z-index: 500; opacity: 0; transform: translateY(8px);
  transition: all 0.2s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.err { background: #991b1b; }

/* ─── STATUS SELECT ─── */
.status-select {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  padding: 3px 6px; border-radius: 4px;
  border: 1px solid var(--border2); background: var(--surface2);
  cursor: pointer; text-transform: uppercase;
}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-logo">PMO CENTRAL</span>
  <div class="tsep"></div>
  <span class="topbar-mode" id="topbarMode">Cargando...</span>
  <div class="tright">
    <div class="sync-pill"><span class="sdot" id="syncDot"></span><span id="syncLabel">—</span></div>
    <button class="btn-top" onclick="syncNow()">↻ Sync</button>
    <button class="btn-top" onclick="exportJSON()">⬇ Backup</button>
    <button class="btn-top" onclick="document.getElementById('importFile').click()">⬆ Importar</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="setView('table')" id="tab-table">Lista</div>
  <div class="tab" onclick="setView('kanban')" id="tab-kanban">Kanban</div>
  <div class="tab" onclick="setView('timeline')" id="tab-timeline">Timeline</div>
</div>

<div class="main">
  <div class="metrics" id="metrics"></div>
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Buscar tarea o responsable..." oninput="render()">
    <select id="filterStatus" onchange="render()">
      <option value="">Todos los estados</option>
      <option>Pendiente</option><option>En progreso</option><option>Completado</option><option>Bloqueado</option>
    </select>
    <select id="filterRole" onchange="render()">
      <option value="">Todos los roles</option>
      <option>PMO</option><option>Secretaria</option><option>Analista</option><option>Gerente</option><option>Cliente</option>
    </select>
    <select id="filterPrio" onchange="render()">
      <option value="">Todas las prioridades</option>
      <option>Alta</option><option>Media</option><option>Baja</option>
    </select>
    <select id="filterMeeting" onchange="render()">
      <option value="">Todas las reuniones</option>
    </select>
    <div class="ml-auto" style="display:flex;gap:8px;">
      <button class="btn" onclick="exportMinuta()">Exportar minuta</button>
      <button class="btn btn-accent" onclick="openNew()">+ Nueva tarea</button>
    </div>
  </div>
  <div id="view-table"></div>
  <div id="view-kanban" style="display:none;"></div>
  <div id="view-timeline" style="display:none;"></div>
</div>

<!-- MODAL TAREA -->
<div class="overlay" id="taskModal">
  <div class="modal">
    <div class="modal-header"><span class="modal-title" id="modalTitle">NUEVA TAREA</span><button class="modal-close" onclick="closeModal()">&#x2715;</button></div>
    <div class="modal-body">
      <div class="field"><label>Descripción</label><input type="text" id="fDesc" placeholder="¿Qué hay que hacer?"></div>
      <div class="field"><label>Reunión de origen</label><input type="text" id="fMeeting" placeholder="Ej: Kick-off 28/03"></div>
      <div class="grid2">
        <div class="field"><label>Responsable</label><input type="text" id="fOwner" placeholder="Nombre completo"></div>
        <div class="field"><label>Rol</label><select id="fRole"><option>PMO</option><option>Secretaria</option><option>Analista</option><option>Gerente</option><option>Cliente</option></select></div>
      </div>
      <div class="grid3">
        <div class="field"><label>Prioridad</label><select id="fPrio"><option>Alta</option><option>Media</option><option>Baja</option></select></div>
        <div class="field"><label>Estado</label><select id="fStatus"><option>Pendiente</option><option>En progreso</option><option>Completado</option><option>Bloqueado</option></select></div>
        <div class="field"><label>Fecha límite</label><input type="date" id="fDate"></div>
      </div>
      <div class="field"><label>Notas</label><textarea id="fNotes" placeholder="Observaciones, acuerdos, contexto..."></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-accent" onclick="saveTask()">Guardar tarea</button></div>
  </div>
</div>

<!-- MODAL EXPORT -->
<div class="overlay" id="exportModal">
  <div class="modal" style="width:640px;">
    <div class="modal-header"><span class="modal-title">EXPORTAR MINUTA</span><button class="modal-close" onclick="closeExport()">&#x2715;</button></div>
    <div class="modal-body"><div id="exportContent" style="font-family:var(--mono);font-size:12px;line-height:1.8;white-space:pre-wrap;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:16px;max-height:480px;overflow-y:auto;color:var(--text);"></div></div>
    <div class="modal-footer"><button class="btn" onclick="closeExport()">Cerrar</button><button class="btn btn-accent" onclick="copyMinuta()">Copiar texto</button></div>
  </div>
</div>

<!-- MODAL OUTLOOK -->
<div class="overlay" id="outlookModal">
  <div class="modal" style="width:580px;">
    <div class="modal-header"><span class="modal-title">📅 CREAR REUNIÓN EN OUTLOOK</span><button class="modal-close" onclick="closeOutlook()">&#x2715;</button></div>
    <div class="modal-body">
      <div class="ocard">
        <div class="ocard-title">Datos de la reunión</div>
        <div class="orow"><label>Asunto</label><input type="text" id="oSubject"></div>
        <div class="orow"><label>Lugar</label><input type="text" id="oLocation" placeholder="Sala, Teams, Zoom..."></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;">
          <div class="orow" style="margin:0;"><label>Fecha</label><input type="date" id="oDate"></div>
          <div class="orow" style="margin:0;"><label>Hora</label><input type="time" id="oTimeStart" value="09:00"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;">
          <div class="orow" style="margin:0;"><label>Duración</label><select id="oDuration"><option value="30">30 min</option><option value="60" selected>1 hora</option><option value="90">1h 30min</option><option value="120">2 horas</option></select></div>
          <div class="orow" style="margin:0;"><label>Recordatorio</label><select id="oReminder"><option value="0">Sin recordatorio</option><option value="15" selected>15 min antes</option><option value="30">30 min</option><option value="60">1 hora</option><option value="1440">1 día</option></select></div>
        </div>
        <div class="orow"><label>Descripción</label><textarea id="oDesc" rows="3"></textarea></div>
      </div>

        <div id="attList" style="margin-bottom:8px;"></div>
        <div class="att-row"><input type="email" id="oAttInput" placeholder="correo@empresa.com" onkeydown="if(event.key==='Enter')addAtt()"><button class="btn-att" onclick="addAtt()">+ Agregar</button></div>

      <div class="otip"><strong>💡</strong> Descarga el archivo <code>.ics</code> para abrirlo en Outlook, o usa "Abrir en Outlook Web" para crearlo directamente online.</div>

    <div class="modal-footer" style="justify-content:space-between;">
      <button class="btn" onclick="openOutlookWeb()">Abrir en Outlook Web ↗</button>
      <div style="display:flex;gap:8px;"><button class="btn" onclick="closeOutlook()">Cancelar</button><button class="btn btn-accent" onclick="downloadICS()">⬇ Descargar .ics</button></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// PMO CENTRAL — PERSISTENCIA HÍBRIDA
// Usa window.storage (Claude artifacts) si está disponible,
// luego localStorage como fallback
// ═══════════════════════════════════════════════════════════════════

const TODAY = new Date().toISOString().split('T')[0];
let currentView = 'table', editingId = null, attendees = [];
let tasks = [], nextId = 1;
let storageMode = 'local'; // 'persistent' | 'local'

// ─── DATOS DE EJEMPLO ────────────────────────────────────────────
const SAMPLE = [
  {id:1,desc:"Elaborar acta de constitución del proyecto",meeting:"Kick-off 28/03",owner:"Carolina Vega",role:"PMO",prio:"Alta",status:"En progreso",due:"2026-04-04",notes:""},
  {id:2,desc:"Validar cronograma con stakeholders clave",meeting:"Kick-off 28/03",owner:"Marcos Díaz",role:"Gerente",prio:"Alta",status:"Pendiente",due:"2026-04-07",notes:"Coordinar con Rodrigo primero"},
  {id:3,desc:"Levantar requerimientos del módulo de reportes",meeting:"Kick-off 28/03",owner:"Andrea Torres",role:"Analista",prio:"Alta",status:"Pendiente",due:"2026-04-10",notes:""},
  {id:4,desc:"Confirmar presupuesto aprobado para Q2",meeting:"Kick-off 28/03",owner:"Rodrigo Fuentes",role:"Cliente",prio:"Alta",status:"Bloqueado",due:"2026-04-02",notes:"Pendiente aprobación directorio"},
  {id:5,desc:"Revisar plantilla estándar de minutas PMO",meeting:"Comité 25/03",owner:"Carolina Vega",role:"PMO",prio:"Media",status:"Completado",due:"2026-03-28",notes:""},
  {id:6,desc:"Preparar informe de avance semanal",meeting:"Comité 25/03",owner:"Marcos Díaz",role:"Gerente",prio:"Media",status:"En progreso",due:"2026-04-04",notes:""},
  {id:7,desc:"Documentar minutas de reuniones anteriores",meeting:"Comité 25/03",owner:"Lucía Soto",role:"Secretaria",prio:"Alta",status:"En progreso",due:"2026-04-03",notes:"Falta reunión del 20/03"},
  {id:8,desc:"Mapear procesos AS-IS del área de logística",meeting:"Comité 25/03",owner:"Andrea Torres",role:"Analista",prio:"Alta",status:"Pendiente",due:"2026-04-14",notes:""},
  {id:9,desc:"Aprobar propuesta de arquitectura técnica",meeting:"Técnica 20/03",owner:"Rodrigo Fuentes",role:"Cliente",prio:"Media",status:"Pendiente",due:"2026-04-08",notes:""},
  {id:10,desc:"Definir matriz de riesgos inicial",meeting:"Técnica 20/03",owner:"Carolina Vega",role:"PMO",prio:"Alta",status:"En progreso",due:"2026-04-05",notes:""},
  {id:11,desc:"Consolidar análisis de datos históricos",meeting:"Técnica 20/03",owner:"Andrea Torres",role:"Analista",prio:"Baja",status:"Pendiente",due:"2026-04-21",notes:""},
  {id:12,desc:"Distribuir acta y pendientes a participantes",meeting:"Técnica 20/03",owner:"Lucía Soto",role:"Secretaria",prio:"Media",status:"Completado",due:"2026-03-22",notes:"Enviado por correo"},
];

// ─── STORAGE LAYER ───────────────────────────────────────────────
const STORAGE_KEY = 'pmo-tasks-data';

async function storageInit() {
  // Try persistent storage first (Claude artifacts)
  if (window.storage) {
    try {
      const result = await window.storage.get(STORAGE_KEY);
      if (result && result.value) {
        const data = JSON.parse(result.value);
        tasks = data.tasks || [];
        nextId = data.nextId || 1;
        storageMode = 'persistent';
        setSync('', 'Sincronizado');
        document.getElementById('topbarMode').textContent = 'Cloud sync activo';
        render();
        return;
      }
    } catch (e) {
      // Key not found — first time, load samples
    }
    // First time: save samples
    tasks = [...SAMPLE];
    nextId = tasks.reduce((m, t) => Math.max(m, t.id || 0), 0) + 1;
    storageMode = 'persistent';
    await storageSave();
    setSync('', 'Sincronizado');
    document.getElementById('topbarMode').textContent = 'Cloud sync activo';
    render();
    return;
  }

  // Fallback: localStorage
  try {
    const s = localStorage.getItem('pmo_tasks');
    if (s) {
      const data = JSON.parse(s);
      tasks = data.tasks || [];
      nextId = data.nextId || 1;
    } else {
      tasks = [...SAMPLE];
      nextId = tasks.reduce((m, t) => Math.max(m, t.id || 0), 0) + 1;
      localSave();
    }
  } catch {
    tasks = [...SAMPLE];
    nextId = SAMPLE.length + 1;
  }
  storageMode = 'local';
  setSync('', 'Local');
  document.getElementById('topbarMode').textContent = 'Almacenamiento local';
  render();
}

async function storageSave() {
  const data = JSON.stringify({ tasks, nextId, lastModified: new Date().toISOString() });
  if (storageMode === 'persistent' && window.storage) {
    try {
      setSync('syncing', 'Guardando...');
      await window.storage.set(STORAGE_KEY, data);
      setSync('', 'Sincronizado');
    } catch (e) {
      setSync('error', 'Error');
      // Fallback to local
      localSave();
    }
  } else {
    localSave();
  }
}

function localSave() {
  try {
    localStorage.setItem('pmo_tasks', JSON.stringify({ tasks, nextId }));
  } catch {}
}

// ─── TOAST / SYNC ────────────────────────────────────────────────
let toastT;
function showToast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (err ? ' err' : '');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 3500);
}
function setSync(s, l) {
  document.getElementById('syncDot').className = 'sdot ' + s;
  document.getElementById('syncLabel').textContent = l;
}

// ─── FILTERS ─────────────────────────────────────────────────────
function updateMeetingFilter() {
  const sel = document.getElementById('filterMeeting');
  const current = sel.value;
  const meetings = [...new Set(tasks.map(t => t.meeting))].sort();
  sel.innerHTML = '<option value="">Todas las reuniones</option>' +
    meetings.map(m => `<option${m === current ? ' selected' : ''}>${m}</option>`).join('');
}

function getF() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const fs = document.getElementById('filterStatus').value;
  const fr = document.getElementById('filterRole').value;
  const fp = document.getElementById('filterPrio').value;
  const fm = document.getElementById('filterMeeting').value;
  return tasks.filter(t => {
    if (q && !t.desc.toLowerCase().includes(q) && !t.owner.toLowerCase().includes(q) && !(t.notes || '').toLowerCase().includes(q)) return false;
    if (fs && t.status !== fs) return false;
    if (fr && t.role !== fr) return false;
    if (fp && t.prio !== fp) return false;
    if (fm && t.meeting !== fm) return false;
    return true;
  });
}

// ─── RENDER ──────────────────────────────────────────────────────
function pb(p) { return `<span class="${{Alta:'prio-high',Media:'prio-med',Baja:'prio-low'}[p] || ''}">${p}</span>`; }
function dc(d) { if (!d) return '<span style="color:#ccc">—</span>'; return `<span class="${d < TODAY ? 'date-over' : 'date-ok'}">${d}${d < TODAY ? ' ⚠' : ''}</span>`; }

function metrics() {
  const t = tasks.length;
  const pe = tasks.filter(x => x.status === 'Pendiente').length;
  const pr = tasks.filter(x => x.status === 'En progreso').length;
  const do_ = tasks.filter(x => x.status === 'Completado').length;
  const bl = tasks.filter(x => x.status === 'Bloqueado').length;
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">Total</div><div class="metric-val mv-total">${t}</div></div>
    <div class="metric"><div class="metric-label">Pendientes</div><div class="metric-val mv-pend">${pe}</div></div>
    <div class="metric"><div class="metric-label">En progreso</div><div class="metric-val mv-prog">${pr}</div></div>
    <div class="metric"><div class="metric-label">Completadas</div><div class="metric-val mv-done">${do_}</div></div>
    <div class="metric"><div class="metric-label">Bloqueadas</div><div class="metric-val mv-block">${bl}</div></div>`;
}

function renderTable(f) {
  const w = document.getElementById('view-table');
  const ms = [...new Set(f.map(t => t.meeting))];
  if (!f.length) { w.innerHTML = '<div class="empty-state">No se encontraron tareas.</div>'; return; }
  let h = '';
  ms.forEach(m => {
    const rows = f.filter(t => t.meeting === m);
    h += `<div class="section-head"><span class="section-title">${m}</span><span class="section-count">${rows.length}</span></div>
    <table><thead><tr><th style="width:34%">Tarea</th><th>Responsable</th><th>Rol</th><th>Prioridad</th><th>Estado</th><th>Fecha límite</th><th></th></tr></thead><tbody>`;
    rows.forEach(t => {
      h += `<tr>
        <td><div class="task-desc">${t.desc}</div>${t.notes ? `<div class="task-sub">${t.notes}</div>` : ''}</td>
        <td style="font-size:13px">${t.owner}</td>
        <td><span class="role-pill">${t.role}</span></td>
        <td>${pb(t.prio)}</td>
        <td><select class="status-select" onchange="changeStatus(${t.id},this.value)">
          ${['Pendiente', 'En progreso', 'Completado', 'Bloqueado'].map(s => `<option${s === t.status ? ' selected' : ''}>${s}</option>`).join('')}
        </select></td>
        <td>${dc(t.due)}</td>
        <td><div class="row-actions">
          <button class="btn btn-sm btn-ghost" onclick="openEdit(${t.id})">Editar</button>
          <button class="btn btn-sm btn-ghost" onclick="openOutlook(${t.id})" style="color:var(--blue)">📅</button>
          <button class="btn btn-sm btn-ghost btn-danger" onclick="delTask(${t.id})">&#x2715;</button>
        </div></td></tr>`;
    });
    h += '</tbody></table>';
  });
  w.innerHTML = h;
}

function renderKanban(f) {
  const w = document.getElementById('view-kanban');
  const cols = [
    { k: 'Pendiente', b: 'kb-pending' },
    { k: 'En progreso', b: 'kb-progress' },
    { k: 'Completado', b: 'kb-done' },
    { k: 'Bloqueado', b: 'kb-blocked' }
  ];
  const dc2 = { 'Alta': 'dot-high', 'Media': 'dot-med', 'Baja': 'dot-low' };
  let h = '<div class="kanban">';
  cols.forEach(c => {
    const cards = f.filter(t => t.status === c.k);
    h += `<div class="k-col"><div class="k-bar ${c.b}"></div><div class="k-header"><span class="k-label">${c.k}</span><span class="k-count">${cards.length}</span></div><div class="k-cards">`;
    if (!cards.length) h += '<div style="font-size:12px;color:var(--text3);text-align:center;padding:12px;">Sin tareas</div>';
    cards.forEach(t => {
      const over = t.due && t.due < TODAY;
      h += `<div class="k-card" onclick="openEdit(${t.id})">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px;">
          <div class="k-card-title">${t.desc}</div>
          <button onclick="event.stopPropagation();openOutlook(${t.id})" style="background:none;border:none;cursor:pointer;font-size:14px;flex-shrink:0;padding:0;color:var(--blue)">📅</button>
        </div>
        <div class="k-card-meta">
          <span class="k-card-prio-dot ${dc2[t.prio] || ''}"></span>
          <span class="role-pill">${t.role}</span>
          <span class="k-card-owner">${t.owner.split(' ')[0]}</span>
          ${t.due ? `<span class="k-card-date ${over ? 'date-over' : 'date-ok'}">${t.due}${over ? ' ⚠' : ''}</span>` : ''}
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:6px;font-family:var(--mono)">${t.meeting}</div>
      </div>`;
    });
    h += '</div></div>';
  });
  w.innerHTML = h + '</div>';
}

function renderTimeline(f) {
  const w = document.getElementById('view-timeline');
  const withDue = f.filter(t => t.due).sort((a, b) => a.due.localeCompare(b.due));
  const noDue = f.filter(t => !t.due);

  if (!withDue.length && !noDue.length) {
    w.innerHTML = '<div class="empty-state">No se encontraron tareas.</div>';
    return;
  }

  const statusDot = { 'Pendiente': 'var(--amber)', 'En progreso': 'var(--blue)', 'Completado': 'var(--green)', 'Bloqueado': 'var(--red)' };
  let h = '';

  // Group by due date
  const groups = {};
  withDue.forEach(t => {
    if (!groups[t.due]) groups[t.due] = [];
    groups[t.due].push(t);
  });

  Object.keys(groups).sort().forEach(date => {
    const isOverdue = date < TODAY;
    const isToday = date === TODAY;
    h += `<div class="timeline-group">
      <div class="tl-date-header">${isToday ? '⬤ HOY — ' : ''}${isOverdue ? '⚠ ' : ''}${date}</div>`;
    groups[date].forEach(t => {
      h += `<div class="tl-item" onclick="openEdit(${t.id})" style="cursor:pointer;">
        <div class="tl-dot" style="background:${statusDot[t.status] || '#ccc'}"></div>
        <div class="tl-content">
          <div class="tl-title">${t.desc}</div>
          <div class="tl-meta">${t.owner} · <span class="role-pill">${t.role}</span> · ${t.status} · ${t.meeting}</div>
        </div>
      </div>`;
    });
    h += '</div>';
  });

  if (noDue.length) {
    h += `<div class="timeline-group"><div class="tl-date-header">Sin fecha definida</div>`;
    noDue.forEach(t => {
      h += `<div class="tl-item" onclick="openEdit(${t.id})" style="cursor:pointer;">
        <div class="tl-dot" style="background:${statusDot[t.status] || '#ccc'}"></div>
        <div class="tl-content">
          <div class="tl-title">${t.desc}</div>
          <div class="tl-meta">${t.owner} · <span class="role-pill">${t.role}</span> · ${t.status} · ${t.meeting}</div>
        </div>
      </div>`;
    });
    h += '</div>';
  }

  w.innerHTML = h;
}

function render() {
  const f = getF();
  metrics();
  updateMeetingFilter();
  if (currentView === 'table') renderTable(f);
  else if (currentView === 'kanban') renderKanban(f);
  else renderTimeline(f);
}

function setView(v) {
  currentView = v;
  ['table', 'kanban', 'timeline'].forEach(x => {
    document.getElementById('view-' + x).style.display = v === x ? 'block' : 'none';
    document.getElementById('tab-' + x).classList.toggle('active', v === x);
  });
  render();
}

async function changeStatus(id, val) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.status = val;
  render();
  await storageSave();
}

// ─── MODAL ───────────────────────────────────────────────────────
function openNew() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'NUEVA TAREA';
  ['fDesc', 'fMeeting', 'fOwner', 'fDate', 'fNotes'].forEach(i => document.getElementById(i).value = '');
  document.getElementById('fRole').value = 'PMO';
  document.getElementById('fPrio').value = 'Alta';
  document.getElementById('fStatus').value = 'Pendiente';
  document.getElementById('taskModal').classList.add('open');
  setTimeout(() => document.getElementById('fDesc').focus(), 100);
}

function openEdit(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'EDITAR TAREA';
  document.getElementById('fDesc').value = t.desc;
  document.getElementById('fMeeting').value = t.meeting;
  document.getElementById('fOwner').value = t.owner;
  document.getElementById('fRole').value = t.role;
  document.getElementById('fPrio').value = t.prio;
  document.getElementById('fStatus').value = t.status;
  document.getElementById('fDate').value = t.due || '';
  document.getElementById('fNotes').value = t.notes || '';
  document.getElementById('taskModal').classList.add('open');
}

function closeModal() { document.getElementById('taskModal').classList.remove('open'); }

async function saveTask() {
  const desc = document.getElementById('fDesc').value.trim();
  if (!desc) { alert('La descripción es requerida.'); return; }
  const data = {
    desc,
    meeting: document.getElementById('fMeeting').value || 'Sin reunión',
    owner: document.getElementById('fOwner').value || 'Sin asignar',
    role: document.getElementById('fRole').value,
    prio: document.getElementById('fPrio').value,
    status: document.getElementById('fStatus').value,
    due: document.getElementById('fDate').value || '',
    notes: document.getElementById('fNotes').value
  };
  if (editingId) {
    const i = tasks.findIndex(t => t.id === editingId);
    if (i > -1) tasks[i] = { ...tasks[i], ...data };
  } else {
    tasks.unshift({ id: nextId++, ...data });
  }
  closeModal();
  render();
  await storageSave();
  showToast('Tarea guardada ✓');
}

async function delTask(id) {
  if (!confirm('¿Eliminar esta tarea?')) return;
  tasks = tasks.filter(t => t.id !== id);
  render();
  await storageSave();
  showToast('Tarea eliminada');
}

// ─── SYNC ────────────────────────────────────────────────────────
async function syncNow() {
  setSync('syncing', 'Sincronizando...');
  await storageInit();
  showToast('Datos actualizados ✓');
}

// ─── EXPORT / IMPORT JSON ────────────────────────────────────────
function exportJSON() {
  const data = JSON.stringify({ tasks, nextId, exportDate: new Date().toISOString() }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `pmo-backup-${TODAY}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup descargado ✓');
}

async function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (data.tasks && Array.isArray(data.tasks)) {
      tasks = data.tasks;
      nextId = data.nextId || tasks.reduce((m, t) => Math.max(m, t.id || 0), 0) + 1;
      render();
      await storageSave();
      showToast(`Importadas ${tasks.length} tareas ✓`);
    } else {
      showToast('Formato de archivo inválido', true);
    }
  } catch (e) {
    showToast('Error al importar: ' + e.message, true);
  }
  event.target.value = '';
}

// ─── OUTLOOK / ICS ───────────────────────────────────────────────
function openOutlook(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  attendees = [];
  document.getElementById('oSubject').value = `[${t.role}] ${t.desc}`;
  document.getElementById('oLocation').value = 'Microsoft Teams';
  document.getElementById('oDate').value = t.due || TODAY;
  document.getElementById('oTimeStart').value = '09:00';
  document.getElementById('oDuration').value = '60';
  document.getElementById('oReminder').value = '15';
  document.getElementById('oDesc').value = `Tarea: ${t.desc}\nReunión: ${t.meeting}\nResponsable: ${t.owner} (${t.role})\nPrioridad: ${t.prio}\nEstado: ${t.status}${t.notes ? '\nNotas: ' + t.notes : ''}`;
  renderAtts();
  document.getElementById('outlookModal').classList.add('open');
}

function closeOutlook() { document.getElementById('outlookModal').classList.remove('open'); }

function addAtt() {
  const i = document.getElementById('oAttInput');
  const v = i.value.trim();
  if (!v) return;
  if (!attendees.includes(v)) attendees.push(v);
  i.value = '';
  renderAtts();
}

function removeAtt(e) { attendees = attendees.filter(a => a !== e); renderAtts(); }

function renderAtts() {
  const l = document.getElementById('attList');
  if (!attendees.length) { l.innerHTML = '<div style="font-size:12px;color:var(--text3);margin-bottom:4px;">Sin asistentes</div>'; return; }
  l.innerHTML = attendees.map(a => `<span class="att-tag">${a}<button onclick="removeAtt('${a}')">&#x2715;</button></span>`).join('');
}

function icsdt(ds, ts, dur) {
  const [y, mo, d] = (ds || TODAY).split('-').map(Number);
  const [h, mi] = (ts || '09:00').split(':').map(Number);
  const pad = n => String(n).padStart(2, '0');
  const s = new Date(y, mo - 1, d, h, mi);
  const e = new Date(s.getTime() + dur * 60000);
  const fmt = dt => `${dt.getFullYear()}${pad(dt.getMonth() + 1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
  return { start: fmt(s), end: fmt(e) };
}

function buildICS() {
  const subj = document.getElementById('oSubject').value || 'Reunión PMO';
  const loc = document.getElementById('oLocation').value || '';
  const desc = document.getElementById('oDesc').value.replace(/\n/g, '\\n');
  const date = document.getElementById('oDate').value;
  const time = document.getElementById('oTimeStart').value;
  const dur = parseInt(document.getElementById('oDuration').value) || 60;
  const rem = parseInt(document.getElementById('oReminder').value) || 0;
  const { start, end } = icsdt(date, time, dur);
  const uid = `pmo-${Date.now()}@pmo`;
  const now = new Date().toISOString().replace(/[-:.]/g, '').slice(0, 15) + 'Z';
  let ics = `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//PMO//ES\r\nMETHOD:REQUEST\r\nBEGIN:VEVENT\r\nUID:${uid}\r\nDTSTAMP:${now}\r\nDTSTART:${start}\r\nDTEND:${end}\r\nSUMMARY:${subj}\r\n`;
  if (loc) ics += `LOCATION:${loc}\r\n`;
  if (desc) ics += `DESCRIPTION:${desc}\r\n`;
  attendees.forEach(a => { ics += `ATTENDEE;RSVP=TRUE:mailto:${a}\r\n`; });
  if (rem > 0) ics += `BEGIN:VALARM\r\nTRIGGER:-PT${rem}M\r\nACTION:DISPLAY\r\nDESCRIPTION:Recordatorio\r\nEND:VALARM\r\n`;
  ics += `END:VEVENT\r\nEND:VCALENDAR`;
  return ics;
}

function downloadICS() {
  const ics = buildICS();
  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (document.getElementById('oSubject').value || 'reunion').replace(/[^a-zA-Z0-9_\-áéíóúñ ]/g, '').replace(/ /g, '_').slice(0, 40) + '.ics';
  a.click();
  URL.revokeObjectURL(url);
}

function openOutlookWeb() {
  const subj = encodeURIComponent(document.getElementById('oSubject').value || 'Reunión PMO');
  const body = encodeURIComponent(document.getElementById('oDesc').value);
  const loc = encodeURIComponent(document.getElementById('oLocation').value || '');
  const date = document.getElementById('oDate').value || TODAY;
  const time = document.getElementById('oTimeStart').value || '09:00';
  const dur = parseInt(document.getElementById('oDuration').value) || 60;
  const se = encodeURIComponent(date + 'T' + time + ':00');
  const ed = new Date(new Date(date + 'T' + time + ':00').getTime() + dur * 60000);
  window.open(`https://outlook.office.com/calendar/deeplink/compose?subject=${subj}&body=${body}&location=${loc}&startdt=${se}&enddt=${encodeURIComponent(ed.toISOString().slice(0, 16))}`, '_blank');
}

// ─── MINUTA ──────────────────────────────────────────────────────
function exportMinuta() {
  const d = new Date().toLocaleDateString('es-CL', { year: 'numeric', month: 'long', day: 'numeric' });
  const ms = [...new Set(tasks.map(t => t.meeting))];
  const so = ['Bloqueado', 'Pendiente', 'En progreso', 'Completado'];
  let txt = `MINUTA DE SEGUIMIENTO — PMO CENTRAL\nGenerada: ${d}\n${'─'.repeat(56)}\n\n`;
  ms.forEach(m => {
    const rows = tasks.filter(t => t.meeting === m).sort((a, b) => so.indexOf(a.status) - so.indexOf(b.status));
    txt += `REUNIÓN: ${m}\n${'─'.repeat(40)}\n`;
    rows.forEach((t, i) => {
      txt += `\n${i + 1}. ${t.desc}\n   Responsable : ${t.owner} (${t.role})\n   Estado      : ${t.status}\n   Prioridad   : ${t.prio}\n`;
      if (t.due) txt += `   Fecha límite: ${t.due}${t.due < TODAY ? ' ⚠ VENCIDA' : ''}\n`;
      if (t.notes) txt += `   Notas       : ${t.notes}\n`;
    });
    txt += '\n';
  });
  txt += `${'─'.repeat(56)}\n`;
  const pe = tasks.filter(t => t.status === 'Pendiente').length;
  const pr = tasks.filter(t => t.status === 'En progreso').length;
  const do_ = tasks.filter(t => t.status === 'Completado').length;
  const bl = tasks.filter(t => t.status === 'Bloqueado').length;
  txt += `RESUMEN: ${tasks.length} tareas — Pendientes:${pe} / En progreso:${pr} / Completadas:${do_} / Bloqueadas:${bl}\n`;
  document.getElementById('exportContent').textContent = txt;
  document.getElementById('exportModal').classList.add('open');
}

function closeExport() { document.getElementById('exportModal').classList.remove('open'); }
function copyMinuta() { navigator.clipboard.writeText(document.getElementById('exportContent').textContent).then(() => showToast('Copiado ✓')).catch(() => {}); }

// ─── MODAL OVERLAYS ──────────────────────────────────────────────
document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', function (e) { if (e.target === this) this.classList.remove('open'); });
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.overlay.open').forEach(o => o.classList.remove('open'));
  }
  if (e.key === 'n' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.tagName !== 'SELECT') {
    e.preventDefault();
    openNew();
  }
});

// ─── INIT ────────────────────────────────────────────────────────
storageInit();
</script>
